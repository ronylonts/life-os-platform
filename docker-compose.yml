services:

  postgres:
    image: postgres:16-alpine
    container_name: lifeos_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lifeos2024
      POSTGRES_DB: lifeos_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:lifeos2024@postgres:5432/lifeos_db
      JWT_SECRET: life_os_super_secret_jwt_key_change_this_in_production
      JWT_EXPIRES_IN: 7d
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeos_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://life-os-platform.onrender.com/api
    ports:
      - "3001:3000"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: lifeos_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lifeos.com
      PGADMIN_DEFAULT_PASSWORD: lifeos2024
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: