name: Life OS CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: lifeos2024
          POSTGRES_DB: lifeos_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:lifeos2024@localhost:5432/lifeos_db_test

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate dev --name ci --skip-seed
        env:
          DATABASE_URL: postgresql://postgres:lifeos2024@localhost:5432/lifeos_db_test
      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:lifeos2024@localhost:5432/lifeos_db_test
          JWT_SECRET: test_jwt_secret_for_ci
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          PORT: 5000

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t life-os-backend ./backend